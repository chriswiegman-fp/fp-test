<!DOCTYPE html>
<html>

<head>
    <title>Test and experimentation with Fingerprint.js</title>
</head>

<body>
    <h1>Fingerprint Test</h1>
    <p><strong>Visitor ID:</strong> <span id="visitor_id"></span></p>
    <p><strong>Event ID:</strong> <span id="event_id"></span></p>

    <script>
        // Initialize the agent at application startup.
        const fpPromise = import('https://fpjscdn.net/v4/O6GrFJdnOZM0KvHjUOGn')
            .then(Fingerprint => Fingerprint.start())

        // Get the visitor and event identifier when you need it.
        fpPromise
            .then(fp => fp.get())
            .then(result => processResult(result))

        function processResult(result) {
            console.log(result)
            document.getElementById('visitor_id').textContent = result.visitor_id;
            document.getElementById('event_id').textContent = result.event_id;
        }
    </script>
</body>

</html>
